openapi: 3.0.3
info:
  title: tahnamao-core
  version: 0.1.0
  description: Core API for local deliveries and future rides expansion.
servers:
  - url: /api/v1
paths:
  /auth/login:
    post:
      tags: [Identity]
      summary: Logs in a driver using CPF and password
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
  /auth/refresh:
    post:
      tags: [Identity]
      summary: Renews access token with refresh token
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens renewed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
  /auth/logout:
    post:
      tags: [Identity]
      summary: Revokes active refresh token(s)
      operationId: authLogout
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Tokens revoked.
  /admin/auth/login:
    post:
      tags: [Admin Auth]
      summary: Logs in an admin using dedicated credentials
      operationId: adminAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessTokenResponse'
  /admin/auth/refresh:
    post:
      tags: [Admin Auth]
      summary: Renews an admin access token using a valid admin refresh token
      operationId: adminAuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Admin tokens renewed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessTokenResponse'
  /customers/register:
    post:
      tags: [Customers]
      summary: Registers a new customer account
      operationId: customersRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCustomerRequest'
      responses:
        '201':
          description: Customer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileResponse'
  /customers/auth/login:
    post:
      tags: [Customers]
      summary: Logs in a customer using email and password
      operationId: customersAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerLoginRequest'
      responses:
        '200':
          description: Tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
  /customers/auth/refresh:
    post:
      tags: [Customers]
      summary: Renews customer access token with refresh token
      operationId: customersAuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens renewed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
  /customers/auth/logout:
    post:
      tags: [Customers]
      summary: Revokes active customer refresh token(s)
      operationId: customersAuthLogout
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Tokens revoked.
  /customers/me:
    get:
      tags: [Customers]
      summary: Returns current customer profile
      operationId: customersGetMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Customer profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileResponse'
    patch:
      tags: [Customers]
      summary: Updates current customer profile
      operationId: customersUpdateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerProfileRequest'
      responses:
        '200':
          description: Customer profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileResponse'
  /customers/me/password:
    patch:
      tags: [Customers]
      summary: Changes current customer password
      operationId: customersChangePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeCustomerPasswordRequest'
      responses:
        '204':
          description: Password changed.
  /customers/me/addresses:
    post:
      tags: [Customers]
      summary: Creates a new address for current customer
      operationId: customersCreateAddress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerAddressRequest'
      responses:
        '201':
          description: Address created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
    get:
      tags: [Customers]
      summary: Lists all active addresses from current customer
      operationId: customersListAddresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active addresses.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerAddressResponse'
  /customers/me/addresses/{id}:
    get:
      tags: [Customers]
      summary: Returns details of one address from current customer
      operationId: customersGetAddressById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
    patch:
      tags: [Customers]
      summary: Updates one address from current customer
      operationId: customersUpdateAddress
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerAddressRequest'
      responses:
        '200':
          description: Address updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
    delete:
      tags: [Customers]
      summary: Soft deletes one address from current customer
      operationId: customersDeleteAddress
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Address removed.
  /customers/me/addresses/{id}/default:
    patch:
      tags: [Customers]
      summary: Defines one address as default for current customer
      operationId: customersSetDefaultAddress
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Default address updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
  /orders:
    post:
      tags: [Orders]
      summary: Creates a new order in iFood model
      operationId: ordersCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '422':
          description: Restaurant closed or item unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpErrorResponse'
  /orders/public/{publicCode}:
    get:
      tags: [Orders]
      summary: Gets public order status by public code
      operationId: ordersPublicStatus
      parameters:
        - in: path
          name: publicCode
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public order status.
          content:
            application/json:
              schema:
                type: object
  /orders/me:
    get:
      tags: [Orders]
      summary: Lists customer orders by customerId
      operationId: ordersMyList
      parameters:
        - in: query
          name: customerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /orders/me/pending-reviews:
    get:
      tags: [Orders]
      summary: Lists delivered orders waiting for review
      operationId: ordersPendingReviews
      parameters:
        - in: query
          name: customerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending reviews list.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /orders/{orderId}/reviews:
    post:
      tags: [Orders]
      summary: Submits review for one delivered order
      operationId: ordersSubmitReview
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
        - in: query
          name: customerId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Review submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /orders/{orderId}/reviews/dismiss:
    post:
      tags: [Orders]
      summary: Dismisses review prompt for one order
      operationId: ordersDismissReviewPrompt
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
        - in: query
          name: customerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prompt dismissed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /restaurants:
    get:
      tags: [Orders]
      summary: Lists active restaurants for catalog
      operationId: restaurantsList
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Restaurants list.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /restaurants/{restaurantId}:
    get:
      tags: [Orders]
      summary: Returns one restaurant with available menu
      operationId: restaurantsGetOneWithMenu
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restaurant with menu.
          content:
            application/json:
              schema:
                type: object
  /restaurants/{restaurantId}/reviews:
    get:
      tags: [Orders]
      summary: Lists public restaurant reviews
      operationId: restaurantsPublicReviews
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public reviews.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /business/restaurants/{restaurantId}/profile:
    get:
      tags: [Orders]
      summary: Gets restaurant business profile
      operationId: businessRestaurantProfileGet
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restaurant profile.
          content:
            application/json:
              schema:
                type: object
    patch:
      tags: [Orders]
      summary: Updates restaurant business profile
      operationId: businessRestaurantProfileUpdate
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Restaurant profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /business/restaurants/{restaurantId}/media:
    patch:
      tags: [Orders]
      summary: Updates restaurant media
      operationId: businessRestaurantMediaUpdate
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Restaurant media updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /business/restaurants/{restaurantId}/menu-items:
    get:
      tags: [Orders]
      summary: Lists restaurant menu items
      operationId: businessRestaurantMenuList
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Menu items.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Orders]
      summary: Creates one restaurant menu item
      operationId: businessRestaurantMenuCreate
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Menu item created.
          content:
            application/json:
              schema:
                type: object
  /business/restaurants/{restaurantId}/menu-items/{menuItemId}:
    patch:
      tags: [Orders]
      summary: Updates one restaurant menu item
      operationId: businessRestaurantMenuUpdate
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
        - in: path
          name: menuItemId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Menu item updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
    delete:
      tags: [Orders]
      summary: Deletes one restaurant menu item
      operationId: businessRestaurantMenuDelete
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
        - in: path
          name: menuItemId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Menu item deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /business/restaurants/{restaurantId}/orders:
    get:
      tags: [Orders]
      summary: Lists restaurant orders
      operationId: businessRestaurantOrdersList
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restaurant orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /business/restaurants/{restaurantId}/orders/{orderId}/status:
    patch:
      tags: [Orders]
      summary: Changes restaurant order status
      operationId: businessRestaurantOrderStatusChange
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Order status changed.
          content:
            application/json:
              schema:
                type: object
  /business/restaurants/{restaurantId}/reviews:
    get:
      tags: [Orders]
      summary: Lists restaurant reviews for business area
      operationId: businessRestaurantReviewsList
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restaurant reviews.
          content:
            application/json:
              schema:
                type: object
  /business/restaurants/{restaurantId}/dashboard-summary:
    get:
      tags: [Orders]
      summary: Returns restaurant dashboard summary
      operationId: businessRestaurantDashboardSummary
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dashboard summary.
          content:
            application/json:
              schema:
                type: object
  /drivers:
    post:
      tags: [Drivers]
      summary: Creates a draft onboarding
      operationId: driversCreateDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDriverDraftRequest'
      responses:
        '201':
          description: Draft created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverDraftResponse'
  /drivers/me:
    patch:
      tags: [Drivers]
      summary: Updates driver profile
      operationId: driversUpdateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDriverProfileRequest'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /drivers/me/password:
    post:
      tags: [Drivers]
      summary: Sets or updates onboarding password
      operationId: driversSetPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
      responses:
        '201':
          description: Password set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /drivers/me/documents:
    post:
      tags: [Drivers]
      summary: Uploads a document metadata entry for manual review
      operationId: driversUploadDocument
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDriverDocumentRequest'
      responses:
        '200':
          description: Document version stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
  /drivers/me/documents/{type}/resubmit:
    post:
      tags: [Drivers]
      summary: Resubmits a document as a new version
      operationId: driversResubmitDocument
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: type
          required: true
          schema:
            $ref: '#/components/schemas/DriverDocumentType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDriverDocumentRequest'
      responses:
        '200':
          description: Document version stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
  /drivers/me/submit:
    post:
      tags: [Drivers]
      summary: Finalizes onboarding package and sends to manual review
      operationId: driversSubmit
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitOnboardingRequest'
      responses:
        '200':
          description: Onboarding submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /drivers/me/onboarding-status:
    get:
      tags: [Drivers]
      summary: Returns onboarding status for current driver
      operationId: driversGetOnboardingStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current onboarding state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverOnboardingStatusResponse'
  /admin/drivers/pending:
    get:
      tags: [Admin Drivers]
      summary: Lists pending driver applications
      operationId: adminDriversPending
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Pending list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingDriversResponse'
  /admin/drivers:
    get:
      tags: [Admin Drivers]
      summary: Lists drivers with status and text filters
      operationId: adminDriversList
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDENTE_APROVACAO, DISPONIVEL, EM_CORRIDA, BLOQUEADO]
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Drivers list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDriversListResponse'
  /admin/drivers/{driverId}:
    get:
      tags: [Admin Drivers]
      summary: Returns a review snapshot for one driver
      operationId: adminDriverSnapshot
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Driver snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDriverSnapshotResponse'
  /admin/drivers/{driverId}/approve:
    post:
      tags: [Admin Drivers]
      summary: Approves one driver
      operationId: adminApproveDriver
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDecisionRequest'
      responses:
        '200':
          description: Driver approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/drivers/{driverId}/reject:
    post:
      tags: [Admin Drivers]
      summary: Rejects one driver
      operationId: adminRejectDriver
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDecisionRequest'
      responses:
        '200':
          description: Driver rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/drivers/{driverId}/block:
    post:
      tags: [Admin Drivers]
      summary: Blocks one driver
      operationId: adminBlockDriver
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDecisionRequest'
      responses:
        '200':
          description: Driver blocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/drivers/{driverId}/unblock:
    post:
      tags: [Admin Drivers]
      summary: Unblocks one driver
      operationId: adminUnblockDriver
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDecisionRequest'
      responses:
        '200':
          description: Driver unblocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/drivers/{driverId}/documents/{documentId}/approve:
    post:
      tags: [Admin Drivers]
      summary: Approves one driver document version
      operationId: adminApproveDriverDocument
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDocumentDecisionRequest'
      responses:
        '200':
          description: Document approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/drivers/{driverId}/documents/{documentId}/reject:
    post:
      tags: [Admin Drivers]
      summary: Rejects one driver document version
      operationId: adminRejectDriverDocument
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDocumentDecisionRequest'
      responses:
        '200':
          description: Document rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /files/register:
    post:
      tags: [Files]
      summary: Registers a file id metadata entry
      operationId: filesRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStoredFileRequest'
      responses:
        '201':
          description: File registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/clients:
    get:
      tags: [Admin Customers]
      summary: Lists customers with name/email filters
      operationId: adminCustomersList
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: email
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Customers list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCustomersListResponse'
  /admin/clients/{customerId}:
    get:
      tags: [Admin Customers]
      summary: Returns one customer snapshot
      operationId: adminCustomerSnapshot
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCustomerListItem'
  /admin/clients/{customerId}/block:
    post:
      tags: [Admin Customers]
      summary: Blocks one customer
      operationId: adminCustomerBlock
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer blocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/clients/{customerId}/unblock:
    post:
      tags: [Admin Customers]
      summary: Unblocks one customer
      operationId: adminCustomerUnblock
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer unblocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOkResponse'
  /admin/orders:
    get:
      tags: [Admin Orders]
      summary: Lists orders for admin panel with filters and pagination
      operationId: adminOrdersList
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDENTE, EM_ANDAMENTO, ENTREGUE, CANCELADO]
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
        - in: query
          name: customer
          schema:
            type: string
        - in: query
          name: driver
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Orders list returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrdersListResponse'
  /admin/orders/{orderId}:
    get:
      tags: [Admin Orders]
      summary: Returns one order snapshot for admin detail page
      operationId: adminOrderById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetailResponse'
  /files/upload:
    post:
      tags: [Files]
      summary: Uploads a file and registers metadata returning fileId
      operationId: filesUpload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: File uploaded and registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadStoredFileResponse'
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe for process health
      operationId: healthLive
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe for dependencies (MongoDB)
      operationId: healthReady
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DriverStatus:
      type: string
      enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, BLOCKED]
    DriverOnboardingStep:
      type: string
      enum: [PROFILE, PASSWORD, DOCUMENTS, SELFIE, SUBMITTED]
    DriverDocumentType:
      type: string
      enum: [CPF_FRONT, CPF_BACK, RG_FRONT, RG_BACK, CNH_FRONT, CNH_BACK, SELFIE]
    DriverDocumentStatus:
      type: string
      enum: [PENDING_REVIEW, APPROVED, REJECTED]
    LoginRequest:
      type: object
      required: [cpf, password]
      properties:
        cpf:
          type: string
          example: '52998224725'
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    LogoutRequest:
      type: object
      properties:
        allSessions:
          type: boolean
          default: false
    AuthTokensResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresInSeconds]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          example: 900
    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@tahnamao.local
        password:
          type: string
          format: password
    AdminAccessTokenResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresInSeconds]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          example: 900
    CustomerStatus:
      type: string
      enum: [ACTIVE, BLOCKED]
    RegisterCustomerRequest:
      type: object
      required: [name, email, phone, password]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 120
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 20
        password:
          type: string
          format: password
          minLength: 8
    CustomerLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    UpdateCustomerProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 120
        phone:
          type: string
          maxLength: 20
    ChangeCustomerPasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8
    CustomerProfileResponse:
      type: object
      required: [id, name, email, phone, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        status:
          $ref: '#/components/schemas/CustomerStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateCustomerAddressRequest:
      type: object
      required: [cep, numero]
      properties:
        cep:
          type: string
          pattern: '^\\d{8}$'
        logradouro:
          type: string
        numero:
          type: string
        complemento:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
          pattern: '^[A-Z]{2}$'
        apelido:
          type: string
        isDefault:
          type: boolean
    UpdateCustomerAddressRequest:
      type: object
      properties:
        cep:
          type: string
          pattern: '^\\d{8}$'
        logradouro:
          type: string
        numero:
          type: string
        complemento:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
          pattern: '^[A-Z]{2}$'
        apelido:
          type: string
        isDefault:
          type: boolean
    CustomerAddressResponse:
      type: object
      required:
        - id
        - cep
        - logradouro
        - numero
        - bairro
        - cidade
        - estado
        - isDefault
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        cep:
          type: string
        logradouro:
          type: string
        numero:
          type: string
        complemento:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
        apelido:
          type: string
        isDefault:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderPaymentMethod:
      type: string
      enum: [CREDIT_CARD, DEBIT_CARD, PIX, CASH]
    OrderStatus:
      type: string
      enum: [PENDING]
    CreateOrderItemRequest:
      type: object
      required: [menuItemId, quantity]
      properties:
        menuItemId:
          type: string
        quantity:
          type: integer
          minimum: 1
        observation:
          type: string
          maxLength: 500
    CreateOrderDeliveryAddressRequest:
      type: object
      required: [street, number, neighborhood, city, state, zipCode, lat, lng]
      properties:
        street:
          type: string
        number:
          type: string
        complement:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
    CreateOrderRequest:
      type: object
      required: [restaurantId, items, deliveryAddress, paymentMethod]
      properties:
        restaurantId:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'
        deliveryAddress:
          $ref: '#/components/schemas/CreateOrderDeliveryAddressRequest'
        paymentMethod:
          $ref: '#/components/schemas/OrderPaymentMethod'
    CreateOrderResponse:
      type: object
      required: [orderId, status]
      properties:
        orderId:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
    HttpErrorResponse:
      type: object
      required: [statusCode, message, path, method]
      properties:
        statusCode:
          type: integer
        message:
          type: string
        path:
          type: string
        method:
          type: string
        correlationId:
          type: string
    CreateDriverDraftRequest:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
    DriverDraftResponse:
      type: object
      required: [driverId, status, accessToken]
      properties:
        driverId:
          type: string
        status:
          $ref: '#/components/schemas/DriverStatus'
        accessToken:
          type: string
    UpdateDriverProfileRequest:
      type: object
      required: [fullName, cpf, birthDate, phone, email]
      properties:
        fullName:
          type: string
        cpf:
          type: string
        birthDate:
          type: string
          format: date
        phone:
          type: string
        email:
          type: string
          format: email
    SetPasswordRequest:
      type: object
      required: [password, passwordConfirm]
      properties:
        password:
          type: string
          format: password
          minLength: 8
        passwordConfirm:
          type: string
          format: password
    RegisterDriverDocumentRequest:
      type: object
      required: [type, fileId, mimeType, originalFileName, fileSizeBytes]
      properties:
        type:
          $ref: '#/components/schemas/DriverDocumentType'
        fileId:
          type: string
        mimeType:
          type: string
        originalFileName:
          type: string
        fileSizeBytes:
          type: string
        extractedCpfNormalized:
          type: string
        extractedFullName:
          type: string
    SubmitOnboardingRequest:
      type: object
      properties:
        declarationAccepted:
          type: boolean
          default: true
    DocumentVersionResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: integer
    DriverOnboardingStatusResponse:
      type: object
      required: [driverId, status, onboardingStep]
      properties:
        driverId:
          type: string
        status:
          $ref: '#/components/schemas/DriverStatus'
        onboardingStep:
          $ref: '#/components/schemas/DriverOnboardingStep'
        rejectionReason:
          type: string
    DriverDocumentSnapshot:
      type: object
      required: [id, type, status, version, fileId]
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/DriverDocumentType'
        status:
          $ref: '#/components/schemas/DriverDocumentStatus'
        version:
          type: integer
        fileId:
          type: string
        rejectionReason:
          type: string
    PendingDriversResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    AdminCustomerListItem:
      type: object
      required: [id, name, email, phone, status]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        status:
          type: string
          enum: [ATIVO, BLOQUEADO]
        createdAt:
          type: string
          format: date-time
    AdminCustomersListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminCustomerListItem'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    AdminOrderListStatus:
      type: string
      enum: [PENDENTE, EM_ANDAMENTO, ENTREGUE, CANCELADO]
    AdminOrderListItem:
      type: object
      required: [id, customerName, customerEmail, driverName, status, totalAmount, createdAt]
      properties:
        id:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
          format: email
        driverName:
          type: string
        status:
          $ref: '#/components/schemas/AdminOrderListStatus'
        totalAmount:
          type: number
        createdAt:
          type: string
          format: date-time
    AdminOrdersListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminOrderListItem'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    AdminOrderDetailItem:
      type: object
      required: [menuItemId, quantity, unitPrice, subtotal, name]
      properties:
        menuItemId:
          type: string
        quantity:
          type: integer
        observation:
          type: string
        unitPrice:
          type: number
        subtotal:
          type: number
        name:
          type: string
    AdminOrderStatusHistoryItem:
      type: object
      required: [status, changedAt]
      properties:
        from:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/AdminOrderListStatus'
        changedAt:
          type: string
          format: date-time
    AdminOrderDetailResponse:
      type: object
      required:
        [
          id,
          publicCode,
          customerName,
          customerEmail,
          customerPhone,
          driverName,
          status,
          paymentMethod,
          totalAmount,
          subtotal,
          deliveryFee,
          createdAt,
          updatedAt,
          deliveryAddress,
          items,
          statusHistory,
        ]
      properties:
        id:
          type: string
        publicCode:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
          format: email
        customerPhone:
          type: string
        driverName:
          type: string
        status:
          $ref: '#/components/schemas/AdminOrderListStatus'
        paymentMethod:
          $ref: '#/components/schemas/OrderPaymentMethod'
        totalAmount:
          type: number
        subtotal:
          type: number
        deliveryFee:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deliveryAddress:
          type: object
        orderNotes:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminOrderDetailItem'
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/AdminOrderStatusHistoryItem'
    AdminDriverListItem:
      type: object
      required: [id, fullName, cpf, phone, status]
      properties:
        id:
          type: string
        fullName:
          type: string
        cpf:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [PENDENTE_APROVACAO, DISPONIVEL, EM_CORRIDA, BLOQUEADO, DRAFT, REJECTED]
        createdAt:
          type: string
          format: date-time
    AdminDriversListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminDriverListItem'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    AdminDriverSnapshotResponse:
      type: object
      required: [driver, latestDocuments]
      properties:
        driver:
          type: object
        latestDocuments:
          type: array
          items:
            $ref: '#/components/schemas/DriverDocumentSnapshot'
    AdminDecisionRequest:
      type: object
      properties:
        reason:
          type: string
        notes:
          type: string
        checkedCpfMatch:
          type: boolean
        checkedFaceMatch:
          type: boolean
        checkedDocumentReadability:
          type: boolean
        checkedFraudSignals:
          type: boolean
    AdminDocumentDecisionRequest:
      type: object
      properties:
        reason:
          type: string
    RegisterStoredFileRequest:
      type: object
      required: [fileId, mimeType, originalFileName, sizeBytes]
      properties:
        fileId:
          type: string
        mimeType:
          type: string
        originalFileName:
          type: string
        sizeBytes:
          type: integer
          minimum: 1
    UploadStoredFileResponse:
      type: object
      required: [status, fileId, mimeType, originalFileName, sizeBytes]
      properties:
        status:
          type: string
          example: ok
        fileId:
          type: string
        mimeType:
          type: string
        originalFileName:
          type: string
        sizeBytes:
          type: integer
          minimum: 1
    StatusOkResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    HealthCheckItem:
      type: object
      required:
        - dependency
        - status
        - details
      properties:
        dependency:
          type: string
          example: mongo
        status:
          type: string
          enum: [up, down]
        details:
          type: string
          example: reachable
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
        - timestamp
        - checks
      properties:
        status:
          type: string
          enum: [ok, error]
        service:
          type: string
          example: tahnamao-core
        version:
          type: string
          example: 0.1.0
        timestamp:
          type: string
          format: date-time
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckItem'
