name: Deploy API Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote path exists
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.VPS_PATH }}'"

      - name: Upload files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist package.json package-lock.json \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"

      - name: Write .env and deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash << 'REMOTE'
          set -euo pipefail

          cat > '${{ secrets.VPS_PATH }}/.env' << 'ENVEOF'
          ${{ secrets.APP_ENV_FILE }}
          ENVEOF
          chmod 600 '${{ secrets.VPS_PATH }}/.env'

          cd '${{ secrets.VPS_PATH }}'
          npm install --omit=dev

          app_name=""
          if pm2 describe tahnamao-core > /dev/null 2>&1; then
            app_name="tahnamao-core"
          elif pm2 describe tahnamao > /dev/null 2>&1; then
            app_name="tahnamao"
          fi

          old_pid="none"
          if [ -n "${app_name}" ]; then
            old_pid="$(pm2 pid "${app_name}" || true)"
          fi

          if [ -z "${app_name}" ]; then
            pm2 start dist/src/main.js \
              --name tahnamao-core \
              --env production
            app_name="tahnamao-core"
          else
            pm2 restart "${app_name}" --update-env
          fi

          new_pid="$(pm2 pid "${app_name}" || true)"
          echo "PM2 app target      : ${app_name}"
          echo "PM2 PID before restart: ${old_pid:-none}"
          echo "PM2 PID after restart : ${new_pid:-none}"
          pm2 status "${app_name}"
          pm2 save
          REMOTE
