# MongoDB local para desenvolvimento do tahnamao-core.
# Uso: docker compose up -d
# URI padrão (sem auth): mongodb://localhost:27017/tahnamao-core
# Copie .env.example para .env e ajuste se necessário.

services:
  mongo:
    image: mongo:8.0
    container_name: tahnamao-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: tahnamao-core
    volumes:
      - tahnamao_mongo_data:/data/db
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          '--eval',
          "db.adminCommand('ping').ok ? quit(0) : quit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  tahnamao_mongo_data:
    name: tahnamao_mongo_data
